<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Para Tali ❤️</title>

<style>

    background: linear-gradient(#ff9a9e,#fad0c4);
    font-family: Arial;
    text-align: center;
    color: white;
}

h1{
    margin-top:30px;
}

.foto{
    width:300px;
    border-radius:20px;
    box-shadow:0 0 15px rgba(0,0,0,0.4);
}

.texto{
    font-size:20px;
    margin-bottom:40px;
}

button{
    padding:10px 20px;
    font-size:18px;
    border:none;
    border-radius:10px;
    background:#ff4b7d;
    color:white;
}
</style>

</head>

<body>

<h1>❤️ Para Tali ❤️</h1>

<img class="foto" src="foto1.jpg">
<p class="texto">Sos la luz que ilumina todos mis días</p>

<img class="foto" src="foto2.jpg">
<p class="texto">Con vos todo es más lindo</p>

<img class="foto" src="foto3.jpg">
<p class="texto">Gracias por estar siempre conmigo</p>

<button onclick="document.getElementById('musica').play()">🎵 Reproducir música</button>

<audio id="musica" src="musica.mp3"></audio>

</body>
</html>
