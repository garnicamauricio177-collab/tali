<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>FELIZ DIA DE LA MUJER MI AMOR ❤️</title>

<style>
body{
    margin:0;
    background:black;
    font-family:Arial;
    color:white;
    overflow:hidden;
}

.contenedor{
    position:relative;
    width:100vw;
    height:100vh;
}

.foto{
    width:100%;
    height:100%;
    object-fit:contain;
}

.descripcion{
    position:absolute;
    bottom:40px;
    width:100%;
    text-align:center;
    font-size:28px;
    background:rgba(0,0,0,0.4);
    padding:15px;
}

.flecha{
    position:absolute;
    top:50%;
    transform:translateY(-50%);
    font-size:50px;
    cursor:pointer;
    user-select:none;
    padding:20px;
}

.izquierda{
    left:10px;
}

.derecha{
    right:10px;
}

.flecha:hover{
    color:#ff4b7d;
}

.boton-musica{
    position:absolute;
    top:20px;
    right:20px;
    background:#ff4b7d;
    border:none;
    padding:10px 15px;
    color:white;
    font-size:16px;
    border-radius:10px;
    cursor:pointer;
}
</style>
</head>

<body>

<div class="contenedor">

<img id="imagen" class="foto">

<div class="descripcion" id="texto"></div>

<div class="flecha izquierda" onclick="anterior()">❮</div>
<div class="flecha derecha" onclick="siguiente()">❯</div>

<button class="boton-musica" onclick="toggleMusica()">🎵 Música</button>

<audio id="musica" src="musica.mp3" loop></audio>

</div>

<script>

let fotos = [
{img:"foto1.jpg", texto:"Sos la luz que ilumina todos mis días, sin vos no puedo estar. A meses de cumplir un año te digo que sos la mujer más hermosa de esta vida"},
{img:"foto2.jpg", texto:"Con vos todo es más lindo. Vení a cebarme mates toda mi vida, que cada mate es más dulce no por el azúcar sino porque tu compañía hace más dulce todo"},
{img:"foto3.jpg", texto:"Cada momento con vos es especial y único. Cada momento es como la primera vez porque nunca viví algo tan lindo con alguien tan hermosa"},
{img:"foto4.jpg", texto:"Gracias por hacerme tan feliz"},
{img:"foto5.jpg", texto:"Te amo mucho hoy y mañana cada día más ❤️"},
{img:"foto6.jpg", texto:"Un viaje único, por cómo fuimos y con quién estuvimos. Esta historia quiero que jamás termine"},
{img:"foto7.jpg", texto:"FELIZ DÍA DE LA MUJER MI AMOR. SOS LO MÁS HERMOSO QUE ME PASÓ EN LA VIDA. SOS UNA MUJER ÚNICA, PRECIOSA. TU BELLEZA ILUMINA Y TU SONRISA ME ALEGRA LA VIDA. TE AMO HOY Y TODA LA VIDA"}
];

let index = 0;

function mostrar(){
document.getElementById("imagen").src = fotos[index].img;
document.getElementById("texto").innerText = fotos[index].texto;
}

function siguiente(){
index++;
if(index >= fotos.length){index = 0;}
mostrar();
}

function anterior(){
index--;
if(index < 0){index = fotos.length-1;}
mostrar();
}

function toggleMusica(){
let m = document.getElementById("musica");
if(m.paused){m.play();}
else{m.pause();}
}

mostrar();

</script>

</body>
</html>
